<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SEMEJKA VOICE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .screen { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #FEE0B7 0%, #FDD299 33%, #EB8680 66%, #E67D76 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .screen.active { display: flex; }
        .box {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 40px; padding: 45px 35px; max-width: 420px; width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,0.5);
            text-align: center; border: 1px solid rgba(255,255,255,0.8);
        }
        h1 { color: #3A3A4A; font-size: 28px; margin-bottom: 10px; font-weight: 700; }
        p { color: #555; margin-bottom: 35px; font-size: 18px; }
        .id-highlight { color: #6C63FF; font-weight: bold; background: rgba(255,255,255,0.5); padding: 6px 12px; border-radius: 12px; display: inline-block; margin-top: 10px; }
        input { 
            width: 100%; padding: 18px 24px; font-size: 18px; 
            border: 1px solid rgba(255,255,255,0.8); border-radius: 25px; 
            margin-bottom: 20px; background: rgba(255,255,255,0.5); 
            outline: none; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }
        input:focus { border-color: #6C63FF; background: rgba(255,255,255,0.8); box-shadow: 0 0 0 4px rgba(108,99,255,0.2); }
        button { 
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, #6C63FF, #8B82FF); 
            color: white; border: none; border-radius: 25px; 
            font-size: 20px; font-weight: 700; cursor: pointer; 
            transition: 0.2s; box-shadow: 0 10px 25px rgba(108,99,255,0.4); 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(108,99,255,0.5); }
        .status-text { font-size: 20px; font-weight: 600; color: #3A3A4A; margin-bottom: 40px; }
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto 50px; }
        .avatar { width: 100%; height: 100%; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 45px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2; position: relative; }
        .pulse { position: absolute; width: 100%; height: 100%; background: rgba(108, 99, 255, 0.4); border-radius: 50%; top: 0; left: 0; z-index: 1; display: none; }
        .calling .pulse { display: block; animation: pulseAnimation 2s infinite ease-out; }
        @keyframes pulseAnimation { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .call-controls { display: flex; gap: 15px; width: 100%; }
        .btn-mute { background: linear-gradient(135deg, #4A4A5A, #6A6A7A); }
        .btn-mute.muted { background: linear-gradient(135deg, #f64f59, #c471ed); }
        .btn-hangup { background: linear-gradient(135deg, #EB8680, #E67D76); }
    </style>
</head>
<body>

    <div id="mainScreen" class="screen active">
        <div class="box">
            <h1>SEMEJKA VOICE</h1>
            <p>Ваш ID для звонка:<br><span id="my-id" class="id-highlight">Генерация...</span></p>
            <input type="text" id="peer-id" placeholder="Введи ID собеседника">
            <button id="call-btn">Позвонить</button>
        </div>
    </div>

    <div id="callScreen" class="screen">
        <div class="box">
            <div id="avatarBox" class="avatar-container">
                <div class="avatar">🎙️</div>
                <div class="pulse"></div>
            </div>
            <div id="status" class="status-text">Соединение...</div>
            <div class="call-controls">
                <button id="mute-btn" class="btn-mute">Выкл. микро</button>
                <button id="hangup-btn" class="btn-hangup">Сбросить</button>
            </div>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
